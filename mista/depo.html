<!doctype html>
<html lang="cs"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Depo | Modelové kolejiště</title>
<style>
:root{color-scheme:dark}*{box-sizing:border-box}body{margin:0;background:#080b10;color:#eef3f8;font-family:Inter,system-ui,-apple-system,Segoe UI,sans-serif}.wrap{width:min(1100px,calc(100% - 32px));margin:auto;padding:28px 0 56px}.back{display:inline-block;color:#15110a;background:#ffcf4a;text-decoration:none;font-weight:800;padding:10px 14px;border-radius:11px;margin-bottom:28px}h1{font-size:clamp(30px,6vw,58px);margin:0 0 12px}.lead{color:#b8c2cf;font-size:18px;line-height:1.65;max-width:760px}.gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:30px}figure{display:none;margin:0;min-height:260px;border:1px solid rgba(255,255,255,.12);border-radius:18px;overflow:hidden;background:#111823;cursor:zoom-in}figure.loaded{display:block}figure img{width:100%;height:100%;min-height:260px;object-fit:cover;display:block}.text{margin-top:32px;padding:22px;border-radius:18px;background:#0e141d;border:1px solid rgba(255,255,255,.1);line-height:1.75;color:#c5ced9}.lightbox{position:fixed;inset:0;z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;background:rgba(0,0,0,.92);backdrop-filter:blur(8px)}.lightbox.open{display:flex}.lightbox img{max-width:96vw;max-height:92vh;object-fit:contain;border-radius:12px;box-shadow:0 24px 80px rgba(0,0,0,.7)}.lightbox-close{position:fixed;right:18px;top:14px;width:46px;height:46px;border:1px solid rgba(255,255,255,.25);border-radius:50%;background:rgba(10,14,20,.82);color:#fff;font-size:30px;line-height:1;cursor:pointer}.lightbox-hint{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);color:#cbd3dc;font-size:13px;background:rgba(10,14,20,.72);padding:7px 11px;border-radius:999px}@media(max-width:760px){.gallery{grid-template-columns:1fr}figure,figure img{min-height:220px}.lightbox{padding:8px}.lightbox img{max-width:100vw;max-height:100vh;border-radius:0}.lightbox-hint{display:none}}
</style></head><body><main class="wrap"><a class="back" href="../index.html">← Zpět na mapu</a><h1>Depo</h1><p class="lead">Zázemí pro odstavení, údržbu a provozní ošetření lokomotiv.</p><section class="gallery"><figure><img data-base="../images/mista/depo-1" alt="Depo – fotografie 1" loading="lazy"></figure><figure><img data-base="../images/mista/depo-2" alt="Depo – fotografie 2" loading="lazy"></figure><figure><img data-base="../images/mista/depo-3" alt="Depo – fotografie 3" loading="lazy"></figure></section><section class="text"><h2>Podrobnější popis</h2><p>připravuje se</p></section></main><div id="lightbox" class="lightbox" aria-hidden="true"><button id="lightbox-close" class="lightbox-close" type="button" aria-label="Zavřít">×</button><img id="lightbox-image" src="" alt="Zvětšená fotografie"><div class="lightbox-hint">Kliknutím mimo fotografii nebo klávesou Esc zavřeš</div></div>
<script>
const lightbox=document.getElementById('lightbox');
const lightboxImage=document.getElementById('lightbox-image');
const lightboxClose=document.getElementById('lightbox-close');
const supportedExtensions=['jpg','jpeg','png','webp','JPG','JPEG','PNG','WEBP'];
document.querySelectorAll('.gallery img').forEach(img=>{
  const figure=img.parentElement;
  const base=img.dataset.base;
  let extensionIndex=0;

  function tryNextImage(){
    if(extensionIndex>=supportedExtensions.length){
      figure.remove();
      return;
    }
    img.src=`${base}.${supportedExtensions[extensionIndex++]}`;
  }

  img.addEventListener('load',()=>figure.classList.add('loaded'));
  img.addEventListener('error',tryNextImage);
  tryNextImage();

  img.addEventListener('click',()=>{
    lightboxImage.src=img.currentSrc||img.src;
    lightboxImage.alt=img.alt;
    lightbox.classList.add('open');
    lightbox.setAttribute('aria-hidden','false');
    document.body.style.overflow='hidden';
  });
});
function closeLightbox(){
  lightbox.classList.remove('open');
  lightbox.setAttribute('aria-hidden','true');
  lightboxImage.src='';
  document.body.style.overflow='';
}
lightboxClose.addEventListener('click',closeLightbox);
lightbox.addEventListener('click',e=>{if(e.target===lightbox)closeLightbox();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'&&lightbox.classList.contains('open'))closeLightbox();});
</script></body></html>
